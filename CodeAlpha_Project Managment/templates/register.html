{% extends "base.html" %}

{% block title %}Register — Project Manager{% endblock %}

{% block content %}
<div class="auth-page">
    <h1>Create Account</h1>
    <p class="auth-hint">Register to start managing your projects.</p>

    <form class="auth-form" method="post" action="{{ url_for('register') }}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus minlength="2">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="4">

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="4">

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <p class="auth-link">
        Already have an account? <a href="{{ url_for('login') }}">Log in here</a>
    </p>
</div>
{% endblock %}
