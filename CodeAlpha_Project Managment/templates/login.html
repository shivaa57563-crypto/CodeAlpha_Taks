{% extends "base.html" %}

{% block title %}Login — Project Manager{% endblock %}

{% block content %}
<div class="auth-page">
    <h1>Log In</h1>
    <p class="auth-hint">Enter your username and password to continue.</p>

    <form class="auth-form" method="post" action="{{ url_for('login') }}">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>

        <button type="submit" class="btn btn-primary">Log In</button>
    </form>

    <p class="auth-link">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
</div>
{% endblock %}
