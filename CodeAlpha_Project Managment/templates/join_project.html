{% extends "base.html" %}

{% block title %}Join Project — Project Manager{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Join a Project</h1>
    <p class="page-desc">Enter the project ID to join. You can get the ID from the project owner or from the project page URL.</p>

    <form class="card-form" method="post" action="{{ url_for('join_project') }}">
        <label for="project_id">Project ID *</label>
        <input type="number" id="project_id" name="project_id" required placeholder="e.g. 1" min="1">

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Join Project</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
        </div>
    </form>
</div>
{% endblock %}
